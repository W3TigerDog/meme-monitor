<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meme Monitor Dashboard (10 minutes)</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto; margin: 16px; background:#fafafa; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    input { padding:8px; }
    button { padding:8px 12px; }
    .card { border:1px solid #e5e5e5; border-radius:14px; padding:14px; margin:12px 0; background:#fff; }
    .muted { color:#666; font-size: 12px; }
    .score { font-weight:900; }
    a { word-break: break-all; }

    .group { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e5e5e5; }
    .gtitle { font-size: 12px; font-weight: 900; color: #333; margin-bottom: 6px; }
    .reasons { margin: 0; padding-left: 16px; }
    .reasons li { margin: 4px 0; display: flex; gap: 8px; align-items: baseline; }
    .pts { font-weight: 900; min-width: 36px; display: inline-block; }
    .pts.pos { color: #0a7; }
    .pts.neg { color: #d33; }
    .pts.zero { color: #999; }
    .rtext { color: #444; }

    .toggle { display:flex; align-items:center; gap:6px; }
    .small { width:80px; }

    .clockbar{
      margin: 10px 0 14px;
      padding: 10px 12px;
      border: 1px solid #eee;
      border-radius: 12px;
      background: #fff;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .clk{
      display:flex;
      gap:8px;
      align-items: baseline;
      padding: 6px 10px;
      border: 1px dashed #ddd;
      border-radius: 999px;
      background: #fafafa;
    }
    .clk .label{ font-weight: 900; }
    .clk .time{ font-variant-numeric: tabular-nums; }

    .empty{
      margin-top: 14px;
      padding: 14px;
      border: 1px dashed #ddd;
      border-radius: 14px;
      background: #fff;
    }
    .debug {
      margin-top: 6px;
      font-size: 12px;
      color: #888;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
      font-size: 12px;
      background: #f6f6f6;
      border: 1px solid #eee;
      padding: 1px 6px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2 id="title" style="color:gold;"></h2>

  <div class="clockbar">
    <div class="clk"><span class="label">ET</span><span id="clockET" class="time muted">--:--:--</span></div>
    <div class="clk"><span class="label">MT</span><span id="clockMT" class="time muted">--:--:--</span></div>
    <div class="clk"><span class="label">PT</span><span id="clockPT" class="time muted">--:--:--</span></div>
  </div>

  <div class="row">
    <label>Min Score: <input id="minScore" type="number" value="3" min="0" max="10"></label>
    <label>Keyword: <input id="kw" placeholder="e.g. dog, cat, pepe"></label>

    <label>Alert Score ≥ <input id="alertScore" class="small" type="number" value="5" min="0" max="10"></label>
    <label class="toggle"><input id="soundOn" type="checkbox" checked>Sound</label>

    <button id="clear">Clear</button>
    <span class="muted" id="status">Connecting…</span>
  </div>

  <div class="muted" style="margin-top:6px;">
    Tip: Click anywhere once after opening this page to allow the browser to play alert sounds.
  </div>

  <div class="muted" style="margin-top:6px;">
    Now watching: <b>new memes published within <span id="ageLabel">10</span> minutes</b>
  </div>

  <div id="list"></div>

  <script>
    const AGE_MAX = 10;

    const titleEl = document.getElementById("title");
    const ageLabel = document.getElementById("ageLabel");
    ageLabel.textContent = String(AGE_MAX);
    titleEl.textContent = `🚀 New Meme Monitor Dashboard (${AGE_MAX} minutes)`;

    const list = document.getElementById("list");
    const minScoreEl = document.getElementById("minScore");
    const kwEl = document.getElementById("kw");
    const statusEl = document.getElementById("status");
    const clearBtn = document.getElementById("clear");

    const alertScoreEl = document.getElementById("alertScore");
    const soundOnEl = document.getElementById("soundOn");

    let items = [];

    // ===== Live clocks: ET / MT / PT =====
    const clockET = document.getElementById("clockET");
    const clockMT = document.getElementById("clockMT");
    const clockPT = document.getElementById("clockPT");

    function nowInTZ(tz) {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: tz,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(new Date());
    }

    function tickClocks() {
      clockET.textContent = nowInTZ("America/New_York");
      clockMT.textContent = nowInTZ("America/Denver");
      clockPT.textContent = nowInTZ("America/Los_Angeles");
    }

    tickClocks();
    setInterval(tickClocks, 1000);

    // ===== Time format: ET | MT | PT | UTC =====
    function pad2(n) { return String(n).padStart(2, "0"); }

    function formatUTC(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const y = d.getUTCFullYear();
      const mo = pad2(d.getUTCMonth() + 1);
      const da = pad2(d.getUTCDate());
      const hh = pad2(d.getUTCHours());
      const mm = pad2(d.getUTCMinutes());
      const ss = pad2(d.getUTCSeconds());
      return `${y}-${mo}-${da} ${hh}:${mm}:${ss} UTC`;
    }

    function formatInTZ(iso, tz, label) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";

      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: tz,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(d);

      const get = (type) => parts.find(p => p.type === type)?.value || "";
      return `${get("year")}-${get("month")}-${get("day")} ${get("hour")}:${get("minute")}:${get("second")} ${label}`;
    }

    function formatTimeZones(iso) {
      const et  = formatInTZ(iso, "America/New_York", "ET");
      const mt  = formatInTZ(iso, "America/Denver", "MT");
      const pt  = formatInTZ(iso, "America/Los_Angeles", "PT");
      const utc = formatUTC(iso);
      return [et, mt, pt, utc].filter(Boolean).join(" | ");
    }

    // ✅ STRICT age: always compute minutes from ts, never trust ageMin
    function parseTs(x){
      const ts = x?.ts || x?.timestamp || x?.createdAt;
      if(!ts) return null;
      const t = new Date(ts).getTime();
      if(Number.isNaN(t)) return null;
      return t;
    }

    function ageMinutesFromTs(x){
      const t = parseTs(x);
      if(t == null) return null;
      return (Date.now() - t) / 60000;
    }

    // ===== Sound alerts (Web Audio API) =====
    let audioUnlocked = false;
    let audioCtx = null;

    function unlockAudio() {
      if (audioUnlocked) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      audioCtx.resume?.();
      audioUnlocked = true;
    }

    window.addEventListener("click", unlockAudio, { once: true });

    function beepOnce() {
      if (!audioUnlocked || !audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";
      osc.frequency.value = 880;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const t = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.3, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);

      osc.start(t);
      osc.stop(t + 0.21);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function beepTimes(n) {
      for (let i = 0; i < n; i++) {
        beepOnce();
        await sleep(220);
      }
    }

    function scoreToBeeps(score, threshold) {
      const s = Number(score);
      const t = Number(threshold);
      if (!Number.isFinite(s) || !Number.isFinite(t)) return 0;
      if (s < t) return 0;
      return Math.min(5, 1 + (s - t));
    }

    function tryBeep(score) {
      const threshold = Number(alertScoreEl.value || 0);
      const enabled = soundOnEl.checked;

      if (!enabled) return;
      if (!audioUnlocked) return;

      const n = scoreToBeeps(score, threshold);
      if (n <= 0) return;

      beepTimes(n);
    }

    function parseReasonItem(r) {
      const s = String(r ?? "");
      const m = s.match(/\(([-+]\d+)\)/);
      const pts = m ? Number(m[1]) : 0;
      const text = s.replace(/\s*\(([-+]\d+)\)\s*/g, "").trim();
      return { raw: s, pts, text };
    }

    function groupReasons(reasons) {
      const base = [];
      const momentum = [];
      const risk = [];

      for (const r of (reasons || [])) {
        const item = parseReasonItem(r);

        if (item.pts < 0) { risk.push(item); continue; }
        if (/^(liq\+|px\+)/i.test(item.text)) { momentum.push(item); continue; }
        base.push(item);
      }

      base.sort((a, b) => b.pts - a.pts);
      momentum.sort((a, b) => b.pts - a.pts);
      risk.sort((a, b) => a.pts - b.pts);

      return { base, momentum, risk };
    }

    function renderReasonList(items) {
      if (!items.length) return `<div class="muted">(none)</div>`;
      return `
        <ul class="reasons">
          ${items.map(it => `
            <li>
              <span class="pts ${it.pts < 0 ? "neg" : it.pts === 0 ? "zero" : "pos"}">${it.pts > 0 ? "+" : ""}${it.pts}</span>
              <span class="rtext">${it.text}</span>
            </li>
          `).join("")}
        </ul>
      `;
    }

    function sumPts(items) {
      return (items || []).reduce((acc, it) => acc + (Number(it.pts) || 0), 0);
    }

    function render() {
      const minScore = Number(minScoreEl.value || 0);
      const kw = (kwEl.value || "").toLowerCase().trim();

      // ✅ compute strict age (minutes) from ts
      const withAge = items
        .map(x => ({ ...x, _ts: parseTs(x), _ageMin: ageMinutesFromTs(x) }))
        .filter(x => x._ts != null && x._ageMin != null && Number.isFinite(x._ageMin));

      // ✅ only show within AGE_MAX minutes
      const windowed = withAge.filter(x => x._ageMin <= AGE_MAX);

      const filtered = windowed.filter(x => {
        if (!x || typeof x !== "object" || !x.tokenSymbol) return false;
        if (Number(x.score) < minScore) return false;
        if (kw && !(x.tokenSymbol || "").toLowerCase().includes(kw)) return false;
        return true;
      });

      // ✅ sort newest first, then higher score
      filtered.sort((a, b) => (a._ageMin - b._ageMin) || (Number(b.score) - Number(a.score)));

      if (!filtered.length) {
        list.innerHTML = `
          <div class="empty">
            <div style="font-weight:900;">No matches in the last ${AGE_MAX} minutes</div>
            <div class="muted" style="margin-top:6px;">
              Try lowering <b>Min Score</b>, clearing <b>Keyword</b>, or wait for new launches.
            </div>
            <div class="debug" style="margin-top:10px;">
              Debug: This page now <b>only trusts <code>ts</code></b>. If you see nothing, your backend messages might be missing <code>ts</code>.
            </div>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(x => {
        const g = groupReasons(x.reasons || []);
        const baseSum = sumPts(g.base);
        const momSum  = sumPts(g.momentum);
        const riskSum = sumPts(g.risk);

        return `
          <div class="card">
            <div><span class="score">Score ${x.score}</span> — <b>${x.tokenSymbol || "?"}</b> / ${x.quoteSymbol || "?"}</div>
            <div class="muted">${formatTimeZones(x.ts)} | age: ${x._ageMin.toFixed(1)} min</div>

            <div class="debug">
              debug: <code>ts_ok</code> ${x._ts != null ? "yes" : "no"}
              ${x.ageMin != null ? ` | <code>raw_ageMin</code> ${x.ageMin}` : ""}
            </div>

            <div>liq: ${x.liquidityUsd ?? "?"} | fdv: ${x.fdv ?? "?"} | vol24: ${x.volume24h ?? "?"}</div>

            <div class="muted">
              <div class="group">
                <div class="gtitle">Base (${baseSum >= 0 ? "+" : ""}${baseSum})</div>
                ${renderReasonList(g.base)}
              </div>
              <div class="group">
                <div class="gtitle">Momentum (${momSum >= 0 ? "+" : ""}${momSum})</div>
                ${renderReasonList(g.momentum)}
              </div>
              <div class="group">
                <div class="gtitle">Risk (${riskSum >= 0 ? "+" : ""}${riskSum})</div>
                ${renderReasonList(g.risk)}
              </div>
            </div>

            <div><a href="${x.url}" target="_blank" rel="noopener">Open DexScreener</a></div>
          </div>
        `;
      }).join("");
    }

    clearBtn.onclick = () => { items = []; render(); };

    async function loadInitial() {
      try {
        const res = await fetch("/api/signals");
        const data = await res.json();
        items = (data.signals || []).slice(0, 200);
        render();
      } catch (e) {
        console.error(e);
        statusEl.textContent = "⚠️ Failed to load /api/signals";
      }
    }

    loadInitial();

    let es = new EventSource("/events");
    es.onopen = () => statusEl.textContent = "✅ Connected (live)";
    es.onerror = () => statusEl.textContent = "⚠️ Disconnected, retrying…";
    es.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (!msg || typeof msg !== "object" || !msg.tokenSymbol) return;

        // ✅ strict filter: ts -> minutes
        const age = ageMinutesFromTs(msg);
        if (age == null || !Number.isFinite(age) || age > AGE_MAX) return;

        items.unshift(msg);
        items = items.slice(0, 200);
        render();

        tryBeep(msg.score);
      } catch (e) {
        console.error("Bad SSE message:", e);
      }
    };

    // ✅ prune + refresh UI (strict ts-based)
    setInterval(() => {
      items = items.filter(x => {
        const age = ageMinutesFromTs(x);
        return age != null && Number.isFinite(age) && age <= AGE_MAX;
      });
      render();
    }, 20000);

    // inputs
    minScoreEl.oninput = render;
    kwEl.oninput = render;
  </script>
</body>
</html>
