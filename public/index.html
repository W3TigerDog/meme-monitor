<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Meme Monitor Dashboard</title>

<style>
body { font-family: system-ui, -apple-system, Segoe UI, Roboto; margin:16px; background:#fafafa; }
.row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
input { padding:8px; }
a { word-break: break-all; }




.card{
  border:1px solid #e5e5e5;
  border-radius:14px;
  padding:16px;
  margin:14px 0;
  background:#fff;
}

.hdr{
  display:flex;
  gap:10px;
  align-items:baseline;
  flex-wrap:wrap;
}
.hdr .title{
  font-weight:900;
  font-size:16px;
}
.hdr .pair{
  font-weight:800;
}

.badges{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:10px 0;
}
.pill{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  border:1px solid #eee;
  background:#fafafa;
}
.pill.stage{ background:#fff5f5; border-color:#ffd7d7; }
.pill.conf{ background:#fff9e6; border-color:#ffe7a3; }
.pill.action{ background:#f0f7ff; border-color:#cfe4ff; }

.meta{
  font-size:12px;
  color:#666;
  margin-bottom:8px;
}

.section{
  margin-top:10px;
  padding-top:8px;
  border-top:1px dashed #e5e5e5;
}

.section-title{
  font-size:12px;
  font-weight:900;
  margin-bottom:6px;
}

.reasons{
  margin:0;
  padding-left:16px;
}
.reasons li{
  margin:4px 0;
  display:flex;
  gap:8px;
}
.pts{
  font-weight:900;
  width:36px;
}
.pos{ color:#0a7; }
.neg{ color:#d33; }
.zero{ color:#999; }

.small { width:80px; }
</style>
</head>

<body>

<h2>🚀 Meme Monitor Dashboard</h2>

<div class="row">
<label>Min Score: <input id="minScore" type="number" value="3"></label>
<label>Keyword: <input id="kw"></label>
<button id="clear">Clear</button>
<span id="status">Connecting…</span>
</div>

<div id="list"></div>

<script>
const list = document.getElementById("list");
const minScoreEl = document.getElementById("minScore");
const kwEl = document.getElementById("kw");
const clearBtn = document.getElementById("clear");

let items = [];

function parseReasonItem(r){
  const s = String(r);
  const m = s.match(/\(([-+]?\\d+)\\)/);
  const pts = m ? Number(m[1]) : 0;
  const text = s.replace(/\s*\\(([-+]?\\d+)\\)\s*/g,"").trim();
  return { pts, text };
}

function groupReasons(reasons){
  const base=[], momentum=[], risk=[];
  for(const r of (reasons||[])){
    const item=parseReasonItem(r);
    if(item.pts<0) risk.push(item);
    else if(/^liq\\+|^px\\+/i.test(item.text)) momentum.push(item);
    else base.push(item);
  }
  return { base, momentum, risk };
}

function renderReasonList(arr){
  if(!arr.length) return `<div class="meta">(none)</div>`;
  return `
  <ul class="reasons">
  ${arr.map(r=>`
    <li>
      <span class="pts ${r.pts>0?'pos':r.pts<0?'neg':'zero'}">
        ${r.pts>0?'+':''}${r.pts}
      </span>
      <span>${r.text}</span>
    </li>
  `).join("")}
  </ul>`;
}

function sumPts(arr){
  return arr.reduce((a,b)=>a+b.pts,0);
}

function stageFromAge(age){
  if(age<5) return "Stage 1 — Launch";
  if(age<15) return "Stage 2 — Early";
  if(age<30) return "Stage 3 — Expansion";
  return "Stage 4 — Decay";
}

function render(){
  const minScore=Number(minScoreEl.value||0);
  const kw=(kwEl.value||"").toLowerCase();

  const filtered=items.filter(x=>{
    if(x.score<minScore) return false;
    if(kw && !x.tokenSymbol.toLowerCase().includes(kw)) return false;
    return true;
  });

  list.innerHTML=filtered.map(x=>{
    const g=groupReasons(x.reasons||[]);
    const baseSum=sumPts(g.base);
    const momSum=sumPts(g.momentum);
    const riskSum=sumPts(g.risk);

    const stage=stageFromAge(x.ageMin||0);
    const conf=x.score>=6?"High":x.score>=4?"Medium":"Low";
    const action=x.score>=6?"Watch":x.score>=4?"Caution":"Avoid";

    return `
    <div class="card">

      <div class="hdr">
        <div class="title">V2 Score ${x.score}</div>
        <div class="pair">— ${x.tokenSymbol} / ${x.quoteSymbol}</div>
      </div>

      <div class="badges">
        <div class="pill stage">${stage}</div>
        <div class="pill conf">Confidence: ${conf}</div>
        <div class="pill action">Action: ${action}</div>
      </div>

      <div class="meta">
        age: ${x.ageMin?.toFixed?.(1)} min |
        liq: ${x.liquidityUsd} |
        fdv: ${x.fdv} |
        vol24: ${x.volume24h}
      </div>

      <div class="section">
        <div class="section-title">Base (${baseSum>=0?'+':''}${baseSum})</div>
        ${renderReasonList(g.base)}
      </div>

      <div class="section">
        <div class="section-title">Momentum (${momSum>=0?'+':''}${momSum})</div>
        ${renderReasonList(g.momentum)}
      </div>

      <div class="section">
        <div class="section-title">Risk (${riskSum>=0?'+':''}${riskSum})</div>
        ${renderReasonList(g.risk)}
      </div>

      <div style="margin-top:8px;">
        <a href="${x.url}" target="_blank">Open DexScreener</a>
      </div>

    </div>
    `;
  }).join("");
}

clearBtn.onclick=()=>{items=[];render();};
minScoreEl.oninput=render;
kwEl.oninput=render;

// initial
fetch("/api/signals")
.then(r=>r.json())
.then(data=>{
  items=data.signals||[];
  render();
});

// live stream
const es=new EventSource("/events");
es.onopen=()=>document.getElementById("status").textContent="✅ Connected";
es.onmessage=(ev)=>{
  const msg=JSON.parse(ev.data);
  items.unshift(msg);
  items=items.slice(0,200);
  render();
};
</script>
</body>
</html>
